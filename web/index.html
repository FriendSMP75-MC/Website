  <style>
    /* Core Web Vitals Optimization */
    html {
      scroll-behavior: smooth;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Fullscreen loading screen */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #121212; /* dark background */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 1.5em;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease; /* smooth fade */
    }

    /* Hidden state */
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Spinner style */
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4CAF50;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Tick style (hidden by default) */
    .tick {
      display: none;
      font-size: 2em;
      color: #4CAF50;
      margin-right: 15px;
    }

    .tick.show {
      display: inline-block;
      animation: pop 0.3s ease forwards;
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>

  <script>
    // When Flutter is ready, swap spinner for tick, then fade out
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      if (!loader) {
        return;
      }

      const spinner = loader.querySelector('.spinner');
      const tick = loader.querySelector('.tick');

      // Hide spinner, show tick
      if (spinner) {
        spinner.style.display = 'none';
      }
      if (tick) {
        tick.classList.add('show');
      }

      // Wait a moment to show the tick, then fade out
      setTimeout(() => {
        loader.classList.add('fade-out');
        loader.addEventListener('transitionend', () => loader.remove(), {
          once: true,
        });
      }, 800); // show tick for 0.8s
    });
  </script>
