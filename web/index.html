<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Website for FriendSMP75 minecraft server.">
  
  <meta name="google-adsense-account" content="ca-pub-2317643702082291"> 
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2317643702082291" crossorigin="anonymous"></script>

  <title>FriendSMP75</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #121212; display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: Arial, sans-serif; z-index: 9999;
      opacity: 1; transition: opacity 0.8s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    
    .spinner {
      border: 6px solid #f3f3f3; border-top: 6px solid #4CAF50;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin-right: 15px;
    }
    .tick { display: none; font-size: 2em; color: #4CAF50; margin-right: 15px; }
    .tick.show { display: inline-block; animation: pop 0.3s ease forwards; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    
    ins.adsbygoogle { display: block; min-height: 100px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="tick">✔</div>
    <div>Welcome to FriendSMP75</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      
      // FIX: If the loader is already gone (common in hot restarts), exit early.
      if (!loader) return;

      const spinner = loader.querySelector('.spinner');
      const tick = loader.querySelector('.tick');

      // Defensive updates: only change styles if elements were found
      if (spinner) spinner.style.display = 'none';
      if (tick) tick.classList.add('show');

      setTimeout(() => {
        // Double check loader still exists before adding class
        if (document.getElementById('loading')) {
          loader.classList.add('fade-out');
          
          // Use a one-time listener for cleaner removal
          loader.addEventListener('transitionend', () => {
            if (loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, { once: true });
        }
      }, 800);
    });
  </script>
</body>
</html>
