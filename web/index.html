<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Website for FriendSMP75 minecraft server.">
  <!--Adsense-->
  <meta name='admaven-placement' content=Bqjw5rdr6>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="server_site">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!--Google search console tag-->
  <meta name="google-site-verification" content="G2BVOo9ylx328jvUO8bGsdTJsXnPMIMQJh_zML9kuq0" />

  <title>FriendSMP75</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Fullscreen loading screen */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #121212; /* dark background */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 1.5em;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease; /* smooth fade */
    }

    /* Hidden state */
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Spinner style */
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4CAF50;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Tick style (hidden by default) */
    .tick {
      display: none;
      font-size: 2em;
      color: #4CAF50;
      margin-right: 15px;
    }

    .tick.show {
      display: inline-block;
      animation: pop 0.3s ease forwards;
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="tick">✔</div>
    <div> Welcome to FriendSMP75</div>
  </div>

  <!-- Flutter app -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // When Flutter is ready, swap spinner for tick, then fade out
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      const spinner = loader.querySelector('.spinner');
      const tick = loader.querySelector('.tick');

      // Hide spinner, show tick
      spinner.style.display = 'none';
      tick.classList.add('show');

      // Wait a moment to show the tick, then fade out
      setTimeout(() => {
        loader.classList.add('fade-out');
        loader.addEventListener('transitionend', () => loader.remove());
      }, 800); // show tick for 0.8s
    });
  </script>
</body>
</html>
