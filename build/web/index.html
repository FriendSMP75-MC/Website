<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Website for FriendSMP75 minecraft server.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="server_site">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FriendSMP75</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Fullscreen loading screen */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #121212; /* dark background */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 1.5em;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease; /* smooth fade */
    }

    /* Hidden state */
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Simple spinner */
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4CAF50;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading...</div>
  </div>

  <!-- Flutter app -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Fade out loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      loader.classList.add('fade-out');
      // Remove completely after transition ends
      loader.addEventListener('transitionend', () => loader.remove());
    });
  </script>
</body>
</html>
